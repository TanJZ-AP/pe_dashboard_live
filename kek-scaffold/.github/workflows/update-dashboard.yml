name: Update KEK dashboard

on:
  workflow_dispatch:
  schedule:
    # 02:00 SGT = 18:00 UTC (prior day) — runs nightly after midnight Singapore
    - cron: '0 18 * * *'

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      KEK_DIR: ${{ github.workspace }}/pos_inbox
      KEK_UPLOADS: ${{ github.workspace }}/historical
      KEK_HTML: ${{ github.workspace }}/index.html
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync working tree to latest origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Set up Node (for refresh_dashboard.py JS verify step)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest POS files from OneDrive
        id: fetch
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_EMAIL: ${{ secrets.ONEDRIVE_USER_EMAIL }}
          ONEDRIVE_FOLDER_PATH: ${{ secrets.ONEDRIVE_FOLDER_PATH }}
        run: |
          set -e
          if date=$(python scripts/fetch_pos_files.py); then
            echo "report_date=$date" >> "$GITHUB_OUTPUT"
            echo "Report date: $date"
          else
            rc=$?
            if [ "$rc" = "2" ]; then
              echo "No complete day available. Exiting cleanly."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              exit $rc
            fi
          fi

      - name: Skip if HEAD already covers this date
        if: steps.fetch.outputs.skip != 'true'
        id: gate
        run: |
          set -e
          date="${{ steps.fetch.outputs.report_date }}"
          if git log -1 --pretty=%s | grep -q "$date"; then
            echo "HEAD commit already covers $date. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run KEK pipeline (parse → build views → swap HTML)
        if: steps.fetch.outputs.skip != 'true' && steps.gate.outputs.skip != 'true'
        run: python scripts/refresh_dashboard.py

      - name: Commit and push
        id: push
        if: steps.fetch.outputs.skip != 'true' && steps.gate.outputs.skip != 'true'
        run: |
          set -e
          date="${{ steps.fetch.outputs.report_date }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/kek_parsed.json scripts/kek_dashboard_data.json pos_inbox/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update KEK dashboard — $date"
          git push origin HEAD:main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Static Web Apps
        if: steps.push.outputs.pushed == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KEK }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
