name: Update weekly dashboard

on:
  workflow_dispatch:
  schedule:
    # 22:45 SGT = 14:45 UTC, ~1h45m after POS files typically arrive (~21:00 SGT)
    - cron: '45 14 * * *'

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync working tree to latest origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest POS files from OneDrive
        id: fetch
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ONEDRIVE_USER_EMAIL: ${{ secrets.ONEDRIVE_USER_EMAIL }}
          ONEDRIVE_FOLDER_PATH: ${{ secrets.ONEDRIVE_FOLDER_PATH }}
        run: |
          set -e
          if date=$(python scripts/fetch_pos_files.py); then
            echo "report_date=$date" >> "$GITHUB_OUTPUT"
            echo "Report date: $date"
          else
            rc=$?
            if [ "$rc" = "2" ]; then
              echo "No complete day available. Exiting cleanly."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              exit $rc
            fi
          fi

      - name: Skip if already up to date
        if: steps.fetch.outputs.skip != 'true'
        id: gate
        run: |
          set -e
          date="${{ steps.fetch.outputs.report_date }}"
          if git log -1 --pretty=%s | grep -q "$date"; then
            echo "HEAD commit already covers $date. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Revenue Agent (Claude)
        if: steps.fetch.outputs.skip != 'true' && steps.gate.outputs.skip != 'true'
        uses: anthropics/claude-code-base-action@v0.0.63
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          timeout_minutes: 15
          prompt: |
            You are the Revenue Agent for PizzaExpress Singapore.

            The 4 POS Excel files for report date ${{ steps.fetch.outputs.report_date }}
            have been downloaded into the ./pos_inbox/ folder:

              - PE @ Duo Galleria_dailyReport_${{ steps.fetch.outputs.report_date }}.xlsx
              - PE @ Duo Galleria_menuItemReport_${{ steps.fetch.outputs.report_date }}.xlsx
              - PE @ Star Vista_dailyReport_${{ steps.fetch.outputs.report_date }}.xlsx
              - PE @ Star Vista_menuItemReport_${{ steps.fetch.outputs.report_date }}.xlsx

            Your task:
              1. Read the 4 files and extract the same fields you normally extract
                 (revenue = net sales + service charge excl. GST, daily breakdown,
                 DI+TA, delivery, top menu items per category, etc.).
              2. Update index.html to include ${{ steps.fetch.outputs.report_date }}'s
                 numbers in the current week's tables. Preserve existing formatting,
                 embedded JSON, and historical-week selector behaviour.
              3. Do NOT edit any file other than index.html.

            Structural constraints to preserve (do not remove or rename):
              - Payments table columns: Date, Day, Credit Card, Cash,
                Delivery Platforms, Tips & Adj, Total Collected.
              - The "Tips & Adj" column is computed client-side by
                buildPayTable() as total_collected[i] - daily.combined[i] - daily.gst[i];
                you only need to populate the underlying JSON fields accurately.
              - The sc-note under Payment Methods explains the reconciliation
                (Total Collected = Revenue + GST + Tips & adjustments). Keep it.
              - Key highlights KPI card grid must include these 8 cards in order:
                Revenue, DG Revenue, SV Revenue, DI net sales, TA net sales,
                DI covers, Avg spend/head, Avg table turns. The last two are
                computed client-side from existing kpi fields — do not remove
                the code that renders them.
              - Delivery table has NO Deliveroo column and the delivery_totals
                chart has no Deliveroo segment. Deliveroo is not currently in
                use at either outlet. You may still include "deliveroo": [0,...]
                in the delivery JSON for schema stability, but it will not be
                rendered.
              - The "Top menu items" section (pane-menu) displays the top 10
                INDIVIDUAL menu items by combined revenue, not categories.
                Populate menu.items as an array of up to 10 item names
                (e.g., "Margherita Pizza", "Spaghetti Vongole"), sorted by
                menu.combined descending. Keep menu.dg / menu.sv / menu.combined
                / menu.pct aligned index-for-index with menu.items.
                Also populate the corresponding unit-quantity arrays from the
                menuItemReport xlsx files:
                  - menu.qty_dg: integer units sold at Duo Galleria
                  - menu.qty_sv: integer units sold at Star Vista
                  - menu.qty: qty_dg[i] + qty_sv[i]
                All qty arrays must be index-aligned with menu.items.
                Also populate menu.total — an object aggregating ALL menu
                items (not just the top 10), so the UI can show an "Others"
                row that ties back to total net sales:
                  menu.total = {
                    "dg":      <sum of net sales of all items at DG>,
                    "sv":      <sum of net sales of all items at SV>,
                    "combined": dg + sv,
                    "qty_dg":  <integer sum of all units sold at DG>,
                    "qty_sv":  <integer sum of all units sold at SV>,
                    "qty":     qty_dg + qty_sv
                  }
                The menu.categories field is deprecated; do not emit it for new
                weeks.
              - Do NOT populate w.turns.dg_turns or w.turns.sv_turns — those are
                derived client-side from w.turns.dg_covers / DG_SEATS and
                sv_covers / SV_SEATS (constants in index.html: DG=100, SV=88).
                Keep turns.dg_covers and turns.sv_covers accurate; the turns
                arrays may be omitted or left at any value (UI ignores them).
                Similarly kpi.avg_turns_dg / avg_turns_sv are ignored.

            Keep changes minimal and idempotent.
          allowed_tools: Read,Edit,Bash(python3:*)

      - name: Commit and push
        id: push
        if: steps.fetch.outputs.skip != 'true' && steps.gate.outputs.skip != 'true'
        run: |
          set -e
          date="${{ steps.fetch.outputs.report_date }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- index.html; then
            echo "index.html unchanged. Nothing to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add index.html
          git commit -m "Update weekly dashboard — $date"
          git push origin HEAD:main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Static Web Apps
        if: steps.push.outputs.pushed == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_TREE_08A067E1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
